# .github/workflows/ci.yml
# GitHub Actions CI/CD Pipeline
#
# This runs automatically on every push to 'main' branch
# It checks that both the backend and frontend build without errors
# Render and Vercel handle the actual deployment (CD) by watching this repo

name: CI — Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Check ───────────────────────────────────────────────
  backend:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Check server starts without crash (syntax check)
        run: node --check index.js
        working-directory: server

  # ─── Frontend Check ──────────────────────────────────────────────
  frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm install
        working-directory: client

      - name: Build React app (Vite)
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: https://placeholder-for-ci.onrender.com
