# render.yaml — Render Blueprint (Infrastructure as Code)
# When you connect this repo on render.com, Render reads this file
# and auto-configures everything — you just click Deploy

services:
  - type: web
    name: snaplink-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false        # you fill this in Render dashboard (keeps it secret)
      - key: BASE_URL
        sync: false        # you fill this in — your Render URL after first deploy
      - key: CLIENT_URL
        sync: false        # you fill this in — your Vercel URL after frontend deploy
